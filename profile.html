<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy it</title>
  <link rel="stylesheet" href="main.css">
</head>
  <script src="firebase-runtime-config.js"></script>
<body class="bg-background-light min-h-screen flex items-center justify-center">
  <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-8 border border-slate-200 mt-12">
    <div class="flex justify-end mb-4">
      <button id="profile-logout" class="px-3 py-1.5 text-xs font-semibold rounded-md border border-slate-300 text-slate-700 hover:bg-slate-100 transition-colors">Logout</button>
    </div>
    <h2 class="text-2xl font-bold mb-6 text-primary">Profile Settings</h2>
    <p class="text-slate-500">Update your profile information here.</p>
  </div>
    <!-- Address Form -->
    <form id="addressForm">
      <div style="display: flex; gap: 1rem;">
        <input id="firstName" type="text" placeholder="First name" required style="flex:1;">
        <input id="lastName" type="text" placeholder="Last name" required style="flex:1;">
      </div>
      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <input id="addressLine1" type="text" placeholder="Address" required style="flex:1;">
        <input id="city" type="text" placeholder="City" required style="flex:1;">
      </div>
      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <input id="state" type="text" placeholder="State" required style="flex:1;">
        <input id="country" type="text" placeholder="Country" required style="flex:1;">
      </div>
      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <input id="pincode" type="text" placeholder="Postal/ZIP code" required style="flex:1;">
        <input id="phone" type="text" placeholder="Phone" required style="flex:1;">
      </div>
      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <button type="submit" style="background-color:#e53935;color:white;padding:0.5rem 1.5rem;border:none;border-radius:4px;">Save Address</button>
        <button type="button" onclick="document.getElementById('addressForm').reset();" style="background-color:#bdbdbd;color:white;padding:0.5rem 1.5rem;border:none;border-radius:4px;">Close</button>
      </div>
    </form>

    <script type="module">
      import { addAddress } from "./scripts/user-address.js";
      document.getElementById("addressForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const addressData = {
          name: document.getElementById("firstName").value + " " + document.getElementById("lastName").value,
          phone: document.getElementById("phone").value,
          addressLine1: document.getElementById("addressLine1").value,
          city: document.getElementById("city").value,
          state: document.getElementById("state").value,
          pincode: document.getElementById("pincode").value,
          country: document.getElementById("country").value
        };
        try {
          await addAddress(addressData);
          alert("Address added successfully!");
          document.getElementById("addressForm").reset();
        } catch (err) {
          alert("Failed to add address: " + err.message);
        }
      });
    </script>

  <script src="firebase-runtime-config.js"></script>
  <script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    const logoutButton = document.getElementById('profile-logout');
    if (logoutButton) {
      logoutButton.addEventListener('click', async () => {
        try {
          await signOut(auth);
        } catch (_error) {
        } finally {
          localStorage.removeItem('loggedIn');
          localStorage.removeItem('role');
          window.location.href = 'login.html';
        }
      });
    }
  </script>
</body>
</html>
