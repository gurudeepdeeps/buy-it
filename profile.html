<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy it</title>
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center">
  <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-8 border border-slate-200 mt-12">
    <div class="flex justify-end mb-4">
      <button id="profile-logout" class="px-3 py-1.5 text-xs font-semibold rounded-md border border-slate-300 text-slate-700 hover:bg-slate-100 transition-colors">Logout</button>
    </div>
    <h2 class="text-2xl font-bold mb-6 text-primary">Profile Settings</h2>
    <p class="text-slate-500">Update your profile information here.</p>
  </div>

  <script src="firebase-runtime-config.js"></script>
  <script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    const logoutButton = document.getElementById('profile-logout');
    if (logoutButton) {
      logoutButton.addEventListener('click', async () => {
        try {
          await signOut(auth);
        } catch (_error) {
        } finally {
          localStorage.removeItem('loggedIn');
          localStorage.removeItem('role');
          window.location.href = 'login.html';
        }
      });
    }
  </script>
</body>
</html>
