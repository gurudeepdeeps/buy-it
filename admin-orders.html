<script>
function renderAdminOrders() {
    const orders = JSON.parse(localStorage.getItem('buyit_orders') || '[]');
    const container = document.getElementById('admin-orders-list');
    if (!orders.length) {
        container.innerHTML = '<div class="text-center text-lg text-slate-500 py-12">No orders found.</div>';
        return;
    }
    const stages = ['Processing', 'Shipped', 'Out for Delivery', 'Delivered'];
    container.innerHTML = orders.map((order, idx) => `
        <div class="mb-8 border border-slate-200 rounded-xl bg-white p-6 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-3 gap-2">
                <div>
                    <span class="font-bold text-primary">Order #${order.id}</span>
                    <span class="ml-3 text-slate-500 text-sm">${new Date(order.placedAt).toLocaleString()}</span>
                </div>
                <div>
                    <select data-idx="${idx}" class="order-status-select rounded border px-3 py-1 text-sm font-bold text-slate-900 bg-slate-100 focus:ring-primary focus:border-primary">
                        ${stages.map(s => `<option value="${s}"${order.status===s?' selected':''}>${s}</option>`).join('')}
                    </select>
                </div>
            </div>
            <div class="mb-2">
                ${order.items.map(item => `
                    <div class="flex items-center gap-3 mb-2">
                        <img src="${item.image || 'buyit-logo.png'}" alt="${item.title}" class="w-12 h-12 object-cover rounded border" />
                        <div class="flex-1">
                            <div class="font-semibold">${item.title}</div>
                            <div class="text-xs text-slate-500">Qty: ${item.quantity || 1}</div>
                        </div>
                        <div class="font-bold text-slate-900">â‚¹${item.price}</div>
                    </div>
                `).join('')}
            </div>
            <div class="text-sm text-slate-600">Current Status: <span class="font-bold text-primary">${order.status}</span></div>
        </div>
    `).join('');

    // Add event listeners for status change
    document.querySelectorAll('.order-status-select').forEach(sel => {
        sel.addEventListener('change', function() {
            const idx = this.getAttribute('data-idx');
            orders[idx].status = this.value;
            localStorage.setItem('buyit_orders', JSON.stringify(orders));
            renderAdminOrders(); // re-render to update UI
        });
    });
}
document.addEventListener('DOMContentLoaded', renderAdminOrders);
</script>
