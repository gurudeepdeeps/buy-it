<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy it Admin - Orders</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <script src="admin-auth.js"></script>
  <script src="admin-data.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#135bec',
            'background-light': '#f6f6f8'
          },
          fontFamily: {
            display: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background-light font-display text-slate-900">
  <div class="min-h-screen md:flex">
    <aside class="hidden md:flex md:w-64 md:flex-col bg-white border-r border-slate-200">
      <div class="h-16 px-5 flex items-center border-b border-slate-200">
        <img src="buyit-logo-tansperant.png" alt="Buy it" class="h-20 w-auto object-contain" />
        <span class="ml-3 text-lg font-bold">Admin Panel</span>
      </div>
      <nav class="p-3 space-y-1 flex-1">
        <a href="admin.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Dashboard</a>
        <a href="admin-products.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Products</a>
        <a href="admin-orders.html" class="block px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold">Orders</a>
        <a href="admin-settings.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Settings</a>
      </nav>
      <div class="p-3 border-t border-slate-200">
        <button onclick="adminLogout()" class="w-full px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700">Logout</button>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 lg:p-8">
      <header class="mb-6">
        <h1 class="text-2xl sm:text-3xl font-bold">Orders</h1>
        <p class="text-slate-600 mt-1">Track and update customer orders.</p>
        <p id="orders-sync-status" class="mt-2 text-sm text-slate-500 hidden"></p>
      </header>

      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-600">
              <tr>
                <th class="text-left px-4 py-3">Order ID</th>
                <th class="text-left px-4 py-3">Customer</th>
                <th class="text-left px-4 py-3">Date</th>
                <th class="text-left px-4 py-3">Amount</th>
                <th class="text-left px-4 py-3">Status</th>
                <th class="text-left px-4 py-3">Action</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="admin-toast" class="fixed bottom-4 right-4 z-50 hidden max-w-xs rounded-lg px-4 py-3 text-sm font-medium shadow-lg"></div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
    import { collection, collectionGroup, deleteDoc, doc, documentId, getDocs, query, updateDoc, where, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

    function waitForAuthenticatedUser() {
      return new Promise((resolve) => {
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          unsubscribe();
          resolve(user || null);
        });
      });
    }

    async function loadOrdersFromCloud() {
      try {
        const [topLevelResult, groupedResult] = await Promise.all([
          getDocs(collection(db, 'orders'))
            .then((snapshot) => ({ ok: true, snapshot }))
            .catch(() => ({ ok: false, snapshot: null })),
          getDocs(collectionGroup(db, 'orders'))
            .then((snapshot) => ({ ok: true, snapshot }))
            .catch(() => ({ ok: false, snapshot: null }))
        ]);

        if (!topLevelResult.ok && !groupedResult.ok) {
          return { ok: false, orders: [] };
        }

        const orderByPath = new Map();
        const appendOrders = (snapshot) => {
          if (!snapshot?.docs?.length) {
            return;
          }
          snapshot.docs.forEach((docSnapshot) => {
            orderByPath.set(docSnapshot.ref.path, {
              id: docSnapshot.id,
              ...(docSnapshot.data() || {})
            });
          });
        };

        appendOrders(topLevelResult.snapshot);
        appendOrders(groupedResult.snapshot);

        const orders = Array.from(orderByPath.values());
        return { ok: true, orders };
      } catch (_error) {
        return { ok: false, orders: [] };
      }
    }

    async function updateOrderStatusEverywhere(orderId, nextStatus) {
      const normalizedId = String(orderId || '').trim();
      if (!normalizedId) {
        return { ok: false, updated: 0, reason: 'invalid-id' };
      }

      try {
        const groupedOrders = await getDocs(
          query(collectionGroup(db, 'orders'), where(documentId(), '==', normalizedId))
        );

        if (!groupedOrders.empty) {
          const batch = writeBatch(db);
          groupedOrders.docs.forEach((docSnapshot) => {
            batch.update(docSnapshot.ref, { status: String(nextStatus || 'Processing') });
          });
          await batch.commit();
          return { ok: true, updated: groupedOrders.size };
        }

        await updateDoc(doc(db, 'orders', normalizedId), { status: String(nextStatus || 'Processing') });
        return { ok: true, updated: 1 };
      } catch (_error) {
        return { ok: false, updated: 0, reason: 'cloud-update-failed' };
      }
    }

    async function deleteOrderEverywhere(orderId) {
      const normalizedId = String(orderId || '').trim();
      if (!normalizedId) {
        return { ok: false, deleted: 0, reason: 'invalid-id' };
      }

      try {
        const groupedOrders = await getDocs(
          query(collectionGroup(db, 'orders'), where(documentId(), '==', normalizedId))
        );

        if (!groupedOrders.empty) {
          const batch = writeBatch(db);
          groupedOrders.docs.forEach((docSnapshot) => {
            batch.delete(docSnapshot.ref);
          });
          await batch.commit();
          return { ok: true, deleted: groupedOrders.size };
        }

        await deleteDoc(doc(db, 'orders', normalizedId));
        return { ok: true, deleted: 1 };
      } catch (_error) {
        return { ok: false, deleted: 0, reason: 'cloud-delete-failed' };
      }
    }

    window.AdminOrdersCloud = {
      waitForAuthenticatedUser,
      loadOrdersFromCloud,
      updateOrderStatusEverywhere,
      deleteOrderEverywhere
    };

    window.dispatchEvent(new CustomEvent('adminOrdersCloudReady'));
  </script>

  <script>
    const ORDER_STATUSES = ['Processing', 'Shipped', 'Delivered', 'Cancelled'];
    let isUpdatingOrderStatus = false;
    let toastTimeoutId = null;

    function setOrdersSyncStatus(inProgress, message) {
      const status = document.getElementById('orders-sync-status');
      if (!status) {
        return;
      }

      if (inProgress) {
        status.textContent = message || 'Syncing orders from cloud...';
        status.classList.remove('hidden');
        status.classList.add('animate-pulse');
        return;
      }

      status.classList.add('hidden');
      status.classList.remove('animate-pulse');
      status.textContent = '';
    }

    function showToast(message, type) {
      const toast = document.getElementById('admin-toast');
      if (!toast) {
        return;
      }

      if (toastTimeoutId) {
        window.clearTimeout(toastTimeoutId);
      }

      toast.className = 'fixed bottom-4 right-4 z-50 max-w-xs rounded-lg px-4 py-3 text-sm font-medium shadow-lg';
      if (type === 'success') {
        toast.classList.add('bg-green-600', 'text-white');
      } else {
        toast.classList.add('bg-red-600', 'text-white');
      }

      toast.textContent = message;
      toast.classList.remove('hidden');

      toastTimeoutId = window.setTimeout(() => {
        toast.classList.add('hidden');
      }, 2400);
    }

    function setOrderStatusUpdateInProgress(inProgress) {
      isUpdatingOrderStatus = Boolean(inProgress);
      document.querySelectorAll('[data-action="status"]').forEach((select) => {
        select.disabled = isUpdatingOrderStatus;
        select.classList.toggle('opacity-70', isUpdatingOrderStatus);
        select.classList.toggle('cursor-not-allowed', isUpdatingOrderStatus);
      });
      document.querySelectorAll('[data-action="delete"]').forEach((button) => {
        button.disabled = isUpdatingOrderStatus;
        button.classList.toggle('opacity-70', isUpdatingOrderStatus);
        button.classList.toggle('cursor-not-allowed', isUpdatingOrderStatus);
      });
    }

    function renderOrders() {
      const orders = window.AdminData.getOrders();
      const tbody = document.getElementById('orders-body');

      if (orders.length === 0) {
        tbody.innerHTML = '<tr class="border-t border-slate-100"><td colspan="6" class="px-4 py-8 text-center text-slate-500">No real order data available yet.</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const id = order.id || order.orderId || '-';
        const customer = order.customer || order.customerName || '-';
        const date = window.AdminData.formatDate(order.date || order.createdAt || '');
        const amount = window.AdminData.formatCurrency(order.amount || 0);
        const status = order.status || 'Unknown';
        const badgeClass = window.AdminData.statusBadgeClass(status);
        const selectOptions = ORDER_STATUSES.map((value) => '<option value="' + value + '"' + (value === status ? ' selected' : '') + '>' + value + '</option>').join('');

        return '<tr class="border-t border-slate-100">'
          + '<td class="px-4 py-3 font-medium">' + id + '</td>'
          + '<td class="px-4 py-3">' + customer + '</td>'
          + '<td class="px-4 py-3">' + date + '</td>'
          + '<td class="px-4 py-3">' + amount + '</td>'
          + '<td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ' + badgeClass + '">' + status + '</span></td>'
          + '<td class="px-4 py-3">'
            + '<div class="flex items-center gap-2">'
            + '<select class="rounded border-slate-200 text-xs" data-action="status" data-id="' + id + '">' + selectOptions + '</select>'
            + '<button type="button" class="px-2 py-1 rounded border border-red-200 text-red-600 text-xs hover:bg-red-50" data-action="delete" data-id="' + id + '">Delete</button>'
            + '</div>'
          + '</td>'
          + '</tr>';
      }).join('');

      tbody.querySelectorAll('[data-action="status"]').forEach((select) => {
        select.addEventListener('change', async () => {
          if (isUpdatingOrderStatus) {
            return;
          }
          const orderId = select.getAttribute('data-id');
          try {
            setOrderStatusUpdateInProgress(true);
            if (window.AdminOrdersCloud && typeof window.AdminOrdersCloud.updateOrderStatusEverywhere === 'function') {
              const cloudResult = await window.AdminOrdersCloud.updateOrderStatusEverywhere(orderId, select.value);
              if (!cloudResult.ok) {
                showToast('Failed to sync status to cloud.', 'error');
                renderOrders();
                return;
              }
            }
            window.AdminData.updateOrderStatus(orderId, select.value);
            renderOrders();
            showToast('Order status updated.', 'success');
          } catch (_error) {
            showToast('Failed to update order status.', 'error');
            renderOrders();
          } finally {
            setOrderStatusUpdateInProgress(false);
          }
        });
      });

      tbody.querySelectorAll('[data-action="delete"]').forEach((button) => {
        button.addEventListener('click', async () => {
          if (isUpdatingOrderStatus) {
            return;
          }

          const orderId = button.getAttribute('data-id');
          const shouldDelete = window.confirm('Delete this order? This action cannot be undone.');
          if (!shouldDelete) {
            return;
          }

          try {
            setOrderStatusUpdateInProgress(true);
            if (window.AdminOrdersCloud && typeof window.AdminOrdersCloud.deleteOrderEverywhere === 'function') {
              const cloudResult = await window.AdminOrdersCloud.deleteOrderEverywhere(orderId);
              if (!cloudResult.ok) {
                showToast('Failed to delete order from cloud.', 'error');
                return;
              }
            }

            const deleted = window.AdminData.deleteOrder(orderId);
            renderOrders();
            if (deleted) {
              showToast('Order deleted successfully.', 'success');
            } else {
              showToast('Order could not be deleted.', 'error');
            }
          } catch (_error) {
            showToast('Failed to delete order.', 'error');
          } finally {
            setOrderStatusUpdateInProgress(false);
          }
        });
      });
    }

    function adminLogout() {
      if (typeof window.__adminLogout === 'function') {
        window.__adminLogout();
        return;
      }
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('role');
      window.location.href = 'login.html?admin=1';
    }

    renderOrders();

    let hasHydratedOrdersFromCloud = false;

    async function hydrateOrdersFromCloud() {
      if (hasHydratedOrdersFromCloud) {
        return;
      }
      if (!window.AdminOrdersCloud || typeof window.AdminOrdersCloud.loadOrdersFromCloud !== 'function') {
        return;
      }

      hasHydratedOrdersFromCloud = true;

      setOrdersSyncStatus(true, 'Syncing orders from cloud...');

      await window.AdminOrdersCloud.waitForAuthenticatedUser();

      const existingLocalOrders = typeof window.AdminData.getOrders === 'function' ? window.AdminData.getOrders() : [];

      const result = await window.AdminOrdersCloud.loadOrdersFromCloud();
      if (!result.ok) {
        showToast('Using local order data (cloud unavailable).', 'error');
        setOrdersSyncStatus(false);
        return;
      }

      if (result.orders.length === 0 && existingLocalOrders.length > 0) {
        setOrdersSyncStatus(false);
        return;
      }

      if (typeof window.AdminData.setOrders === 'function') {
        window.AdminData.setOrders(result.orders);
      }
      renderOrders();
      setOrdersSyncStatus(false);
    }

    window.addEventListener('adminOrdersCloudReady', () => {
      hydrateOrdersFromCloud();
    });

    hydrateOrdersFromCloud();
  </script>
</body>
</html>
