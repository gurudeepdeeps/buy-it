<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy it Admin - Orders</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <script src="admin-auth.js"></script>
  <script src="admin-data.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#135bec',
            'background-light': '#f6f6f8'
          },
          fontFamily: {
            display: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background-light font-display text-slate-900">
  <div class="min-h-screen md:flex">
    <aside class="hidden md:flex md:w-64 md:flex-col bg-white border-r border-slate-200">
      <div class="h-16 px-5 flex items-center border-b border-slate-200">
        <img src="buyit-logo-tansperant.png" alt="Buy it" class="h-20 w-auto object-contain" />
        <span class="ml-3 text-lg font-bold">Admin Panel</span>
      </div>
      <nav class="p-3 space-y-1 flex-1">
        <a href="admin.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Dashboard</a>
        <a href="admin-products.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Products</a>
        <a href="admin-orders.html" class="block px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold">Orders</a>
        <a href="admin-settings.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Settings</a>
      </nav>
      <div class="p-3 border-t border-slate-200">
        <button onclick="adminLogout()" class="w-full px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700">Logout</button>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 lg:p-8">
      <header class="mb-6">
        <h1 class="text-2xl sm:text-3xl font-bold">Orders</h1>
        <p class="text-slate-600 mt-1">Track and update customer orders.</p>
      </header>

      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-600">
              <tr>
                <th class="text-left px-4 py-3">Order ID</th>
                <th class="text-left px-4 py-3">Customer</th>
                <th class="text-left px-4 py-3">Date</th>
                <th class="text-left px-4 py-3">Amount</th>
                <th class="text-left px-4 py-3">Status</th>
                <th class="text-left px-4 py-3">Action</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    const ORDER_STATUSES = ['Processing', 'Shipped', 'Delivered', 'Cancelled'];

    function renderOrders() {
      const orders = window.AdminData.getOrders();
      const tbody = document.getElementById('orders-body');

      if (orders.length === 0) {
        tbody.innerHTML = '<tr class="border-t border-slate-100"><td colspan="6" class="px-4 py-8 text-center text-slate-500">No real order data available yet.</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const id = order.id || order.orderId || '-';
        const customer = order.customer || order.customerName || '-';
        const date = window.AdminData.formatDate(order.date || order.createdAt || '');
        const amount = window.AdminData.formatCurrency(order.amount || 0);
        const status = order.status || 'Unknown';
        const badgeClass = window.AdminData.statusBadgeClass(status);
        const selectOptions = ORDER_STATUSES.map((value) => '<option value="' + value + '"' + (value === status ? ' selected' : '') + '>' + value + '</option>').join('');

        return '<tr class="border-t border-slate-100">'
          + '<td class="px-4 py-3 font-medium">' + id + '</td>'
          + '<td class="px-4 py-3">' + customer + '</td>'
          + '<td class="px-4 py-3">' + date + '</td>'
          + '<td class="px-4 py-3">' + amount + '</td>'
          + '<td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ' + badgeClass + '">' + status + '</span></td>'
          + '<td class="px-4 py-3">'
          + '<select class="rounded border-slate-200 text-xs" data-action="status" data-id="' + id + '">' + selectOptions + '</select>'
          + '</td>'
          + '</tr>';
      }).join('');

      tbody.querySelectorAll('[data-action="status"]').forEach((select) => {
        select.addEventListener('change', () => {
          const orderId = select.getAttribute('data-id');
          window.AdminData.updateOrderStatus(orderId, select.value);
          renderOrders();
        });
      });
    }

    function adminLogout() {
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('role');
      window.location.href = 'login.html';
    }

    renderOrders();
  </script>
</body>
</html>
