<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy it Admin - Settings</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <script src="admin-auth.js"></script>
  <script src="admin-data.js"></script>
  <script src="shop.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#135bec',
            'background-light': '#f6f6f8'
          },
          fontFamily: {
            display: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background-light font-display text-slate-900">
  <div class="min-h-screen md:flex">
    <aside class="hidden md:flex md:w-64 md:flex-col bg-white border-r border-slate-200">
      <div class="h-16 px-5 flex items-center border-b border-slate-200">
        <img src="buyit-logo-tansperant.png" alt="Buy it" class="h-20 w-auto object-contain" />
        <span class="ml-3 text-lg font-bold">Admin Panel</span>
      </div>
      <nav class="p-3 space-y-1 flex-1">
        <a href="admin.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Dashboard</a>
        <a href="admin-products.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Products</a>
        <a href="admin-orders.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Orders</a>
        <a href="admin-settings.html" class="block px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold">Settings</a>
      </nav>
      <div class="p-3 border-t border-slate-200">
        <button onclick="adminLogout()" class="w-full px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700">Logout</button>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-6">
      <header>
        <h1 class="text-2xl sm:text-3xl font-bold">Settings</h1>
        <p class="text-slate-600 mt-1">Update admin account credentials.</p>
      </header>

      <section class="bg-white border border-slate-200 rounded-xl p-4 sm:p-6">
        <div class="bg-white border border-slate-200 rounded-xl p-4 sm:p-6 mb-8">
          <h2 class="text-lg font-semibold mb-2">Shipping Charge</h2>
          <label class="block text-sm font-medium mb-1">Shipping Charge (₹)</label>
          <input id="shipping-charge" type="number" min="0" step="1" title="Shipping Charge" class="w-full rounded-lg border-slate-200 mb-2" />
          <button id="save-shipping-charge" class="px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-dark">Save Shipping Charge</button>
        </div>
      </section>
    </main>
  </div>

  <div id="admin-toast" class="fixed top-4 right-4 z-50 hidden max-w-xs rounded-lg px-4 py-3 text-sm font-medium shadow-lg"></div>

  <script type="module">
    import { db } from './firebase-config.js';
    function loadSettings() {
      const settings = window.AdminData.getSettings();
      document.getElementById('shipping-charge').value = settings.shippingCharge || 100;
    }

    function bindSettingsForms() {
      document.getElementById('save-shipping-charge').addEventListener('click', async function (event) {
        event.preventDefault();
        const shippingCharge = Number(document.getElementById('shipping-charge').value) || 100;
        const current = window.AdminData.getSettings();
        const payload = { ...current, shippingCharge };
        window.AdminData.saveSettings(payload);
        // Save to Firestore
        try {
          const { setDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
          await setDoc(doc(db, 'settings', 'global'), { shippingCharge }, { merge: true });
          showToast('Shipping charge updated.', 'success');
        } catch (err) {
          showToast('Failed to save shipping charge to cloud: ' + err.message, 'error');
          return;
        }
      });
    }

    function adminLogout() {
      if (typeof window.__adminLogout === 'function') {
        window.__adminLogout();
        return;
      }
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('role');
      window.location.href = 'login.html?admin=1';
    }

    function showToast(message, type) {
      const toast = document.getElementById('admin-toast');
      if (!toast) return;
      toast.className = 'fixed top-4 right-4 z-50 max-w-xs rounded-lg px-4 py-3 text-sm font-medium shadow-lg';
      toast.classList.remove('hidden');
      toast.textContent = message;
      if (type === 'success') {
        toast.classList.add('bg-blue-600', 'text-white');
      } else {
        toast.classList.add('bg-red-600', 'text-white');
      }
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 2400);
    }

    loadSettings();
    bindSettingsForms();
  </script>
</body>
</html>
