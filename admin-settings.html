<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy it Admin - Settings</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <script src="admin-auth.js"></script>
  <script src="admin-data.js"></script>
  <script src="shop.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#135bec',
            'background-light': '#f6f6f8'
          },
          fontFamily: {
            display: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background-light font-display text-slate-900">
  <div class="min-h-screen md:flex">
    <aside class="hidden md:flex md:w-64 md:flex-col bg-white border-r border-slate-200">
      <div class="h-16 px-5 flex items-center border-b border-slate-200">
        <img src="buyit-logo-tansperant.png" alt="Buy it" class="h-20 w-auto object-contain" />
        <span class="ml-3 text-lg font-bold">Admin Panel</span>
      </div>
      <nav class="p-3 space-y-1 flex-1">
        <a href="admin.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Dashboard</a>
        <a href="admin-products.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Products</a>
        <a href="admin-orders.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Orders</a>
        <a href="admin-settings.html" class="block px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold">Settings</a>
      </nav>
      <div class="p-3 border-t border-slate-200">
        <button onclick="adminLogout()" class="w-full px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700">Logout</button>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-6">
      <header>
        <h1 class="text-2xl sm:text-3xl font-bold">Settings</h1>
        <p class="text-slate-600 mt-1">Update admin account credentials.</p>
      </header>

      <section class="bg-white border border-slate-200 rounded-xl p-4 sm:p-6">
        <div class="bg-white border border-slate-200 rounded-xl p-4 sm:p-6 mb-8">
          <h2 class="text-lg font-semibold mb-2">Shipping Charge</h2>
          <label class="block text-sm font-medium mb-1">Shipping Charge (₹)</label>
          <input id="shipping-charge" type="number" min="0" step="1" title="Shipping Charge" class="w-full rounded-lg border-slate-200 mb-2" />
          <button id="save-shipping-charge" class="px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-dark">Save Shipping Charge</button>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-4 sm:p-6">
          <h2 class="text-lg font-semibold mb-4">Admin Account</h2>
          <form id="admin-account-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Admin Name</label>
              <input id="admin-name" type="text" title="Admin Name" class="w-full rounded-lg border-slate-200" />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Admin Email</label>
              <input id="admin-email" type="email" title="Admin Email" class="w-full rounded-lg border-slate-200" />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Current Password</label>
              <div class="relative">
                <input id="current-password" type="password" title="Current Password" placeholder="Enter current password" class="w-full rounded-lg border-slate-200 pr-12" />
                <button type="button" data-toggle-password="current-password" aria-label="Show current password" class="absolute inset-y-0 right-0 px-3 text-slate-500 hover:text-slate-700">👁️</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">New Password</label>
              <div class="relative">
                <input id="new-password" type="password" title="New Password" placeholder="Enter new password" class="w-full rounded-lg border-slate-200 pr-12" />
                <button type="button" data-toggle-password="new-password" aria-label="Show new password" class="absolute inset-y-0 right-0 px-3 text-slate-500 hover:text-slate-700">👁️</button>
              </div>
              <p id="new-password-strength" class="mt-1 text-xs text-slate-500">Strength: —</p>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Confirm Password</label>
              <div class="relative">
                <input id="confirm-password" type="password" title="Confirm Password" placeholder="Confirm new password" class="w-full rounded-lg border-slate-200 pr-12" />
                <button type="button" data-toggle-password="confirm-password" aria-label="Show confirm password" class="absolute inset-y-0 right-0 px-3 text-slate-500 hover:text-slate-700">👁️</button>
              </div>
              <p id="confirm-password-status" class="mt-1 text-xs text-slate-500">Match: —</p>
            </div>
            <div class="md:col-span-2">
              <button type="submit" class="px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700">Update Admin Account</button>
            </div>
          </form>
        </div>
        </form>
      </section>
    </main>
  </div>

  <div id="admin-toast" class="fixed top-4 right-4 z-50 hidden max-w-xs rounded-lg px-4 py-3 text-sm font-medium shadow-lg"></div>

  <script>
    function loadSettings() {
      const settings = window.AdminData.getSettings();
      document.getElementById('admin-name').value = settings.adminName || 'Admin User';
      document.getElementById('admin-email').value = settings.adminEmail || '';
      document.getElementById('shipping-charge').value = settings.shippingCharge || 100;
    }

    function bindSettingsForms() {
            document.getElementById('save-shipping-charge').addEventListener('click', async function (event) {
              event.preventDefault();
              const shippingCharge = Number(document.getElementById('shipping-charge').value) || 100;
              const current = window.AdminData.getSettings();
              const payload = { ...current, shippingCharge };
              window.AdminData.saveSettings(payload);
              // Save to Firestore
              try {
                const { db } = window.firebaseConfig || {};
                if (db) {
                  const { setDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
                  await setDoc(doc(db, 'settings', 'global'), { shippingCharge }, { merge: true });
                }
              } catch (err) {
                showToast('Failed to save shipping charge to cloud: ' + err.message, 'error');
                return;
              }
              showToast('Shipping charge updated.', 'success');
            });
      const newPasswordInput = document.getElementById('new-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const strengthText = document.getElementById('new-password-strength');
      const matchText = document.getElementById('confirm-password-status');

      const getPasswordStrengthLevel = (password) =>
        window.BUYIT_GET_PASSWORD_STRENGTH(password, {
          emptyClass: 'text-slate-500',
          easyClass: 'text-amber-600',
          strongClass: 'text-blue-600',
          veryStrongClass: 'text-emerald-600'
        });

      function setFeedbackClass(element, className) {
        element.classList.remove('text-slate-500', 'text-amber-600', 'text-blue-600', 'text-emerald-600', 'text-red-600');
        element.classList.add(className);
      }

      function updatePasswordFeedback() {
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        const strength = getPasswordStrengthLevel(newPassword);
        strengthText.textContent = `Strength: ${strength.label}`;
        setFeedbackClass(strengthText, strength.className);

        if (!confirmPassword) {
          matchText.textContent = 'Match: —';
          setFeedbackClass(matchText, 'text-slate-500');
          confirmPasswordInput.setCustomValidity('');
          return;
        }

        if (newPassword === confirmPassword) {
          matchText.textContent = 'Match: Passwords match';
          setFeedbackClass(matchText, 'text-emerald-600');
          confirmPasswordInput.setCustomValidity('');
        } else {
          matchText.textContent = 'Match: Passwords do not match';
          setFeedbackClass(matchText, 'text-red-600');
          confirmPasswordInput.setCustomValidity('Passwords do not match');
        }
      }

      document.querySelectorAll('[data-toggle-password]').forEach((toggleButton) => {
        toggleButton.addEventListener('click', function () {
          const targetId = this.getAttribute('data-toggle-password');
          const input = document.getElementById(targetId);
          if (!input) {
            return;
          }

          const isHidden = input.type === 'password';
          input.type = isHidden ? 'text' : 'password';
          this.textContent = isHidden ? '🙈' : '👁️';

          const labels = {
            'current-password': 'current password',
            'new-password': 'new password',
            'confirm-password': 'confirm password'
          };
          const label = labels[targetId] || 'password';
          this.setAttribute('aria-label', (isHidden ? 'Hide ' : 'Show ') + label);
        });
      });

      newPasswordInput.addEventListener('input', updatePasswordFeedback);
      confirmPasswordInput.addEventListener('input', updatePasswordFeedback);
      updatePasswordFeedback();

      document.getElementById('admin-account-form').addEventListener('submit', function (event) {
        event.preventDefault();

        const adminName = document.getElementById('admin-name').value.trim();
        const adminEmail = document.getElementById('admin-email').value.trim().toLowerCase();
        const currentPassword = document.getElementById('current-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (!adminEmail) {
          alert('Admin email is required.');
          return;
        }

        const current = window.AdminData.getSettings();
        const savedPassword = String(current.adminPassword || '');

        if ((newPassword || confirmPassword) && savedPassword && currentPassword !== savedPassword) {
          alert('Current password is incorrect.');
          return;
        }

        if (newPassword || confirmPassword) {
          if (newPassword !== confirmPassword) {
            alert('Passwords do not match.');
            return;
          }

          const strength = getPasswordStrengthLevel(newPassword);
          if (strength.label === 'Easy') {
            alert('Password strength is Easy. Use a Strong or VeryStrong password.');
            return;
          }
        }

        const shippingCharge = Number(document.getElementById('shipping-charge').value) || 100;
        const payload = {
          ...current,
          adminName,
          adminEmail,
          shippingCharge
        };

        if (newPassword) {
          payload.adminPassword = newPassword;
        }

        window.AdminData.saveSettings(payload);
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        alert('Admin account updated.');
      });
    }

    function adminLogout() {
      if (typeof window.__adminLogout === 'function') {
        window.__adminLogout();
        return;
      }
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('role');
      window.location.href = 'login.html?admin=1';
    }

    function showToast(message, type) {
      const toast = document.getElementById('admin-toast');
      if (!toast) return;
      toast.className = 'fixed top-4 right-4 z-50 max-w-xs rounded-lg px-4 py-3 text-sm font-medium shadow-lg';
      toast.classList.remove('hidden');
      toast.textContent = message;
      if (type === 'success') {
        toast.classList.add('bg-blue-600', 'text-white');
      } else {
        toast.classList.add('bg-red-600', 'text-white');
      }
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 2400);
    }

    loadSettings();
    bindSettingsForms();
  </script>
</body>
</html>
