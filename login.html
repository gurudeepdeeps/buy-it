<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy it - Login</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <link rel="stylesheet" href="main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
                        .login-header {
                          display: flex;
                          flex-direction: column;
                          align-items: center;
                          justify-content: center;
                          margin-bottom: 18px;
                        }
                .divider {
                  display: flex;
                  align-items: center;
                  text-align: center;
                  color: #94a3b8;
                  font-size: 0.97rem;
                  margin: 0 0 18px 0;
                  width: 100%;
                }
                .divider::before, .divider::after {
                  content: '';
                  flex: 1;
                  border-bottom: 1px solid #e5e7eb;
                  margin: 0 10px;
                }
            .google-btn {
              width: 100%;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 10px;
              background: #fff;
              border: 1px solid #e5e7eb;
              border-radius: 8px;
              font-weight: 600;
              font-size: 1.05rem;
              color: #1e293b;
              padding: 10px 0;
              margin-bottom: 18px;
              cursor: pointer;
              transition: background 0.2s, border 0.2s;
            }
            .google-btn:hover {
              background: #f1f5f9;
              border-color: #cbd5e1;
            }
            .google-icon {
              width: 20px;
              height: 20px;
              display: inline-block;
            }
        .login-bg {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f6f8fa;
        }
        .login-header {
          margin-bottom: 28px;
        }
        .login-form {
          display: flex;
          flex-direction: column;
          gap: 0;
        }
        .login-form-email {
          margin-bottom: 18px;
        }
        .login-form-email .login-input {
          box-sizing: border-box;
          width: 100%;
          min-width: 0;
        }
        .login-form-password {
          margin-bottom: 4px;
          position: relative;
        }
        .login-form-password .login-input {
          padding-right: 38px;
          box-sizing: border-box;
          width: 100%;
          min-width: 0;
        }
        .login-btn-margin {
          margin-top: 18px;
        }
        .login-footer-margin {
          margin-top: 22px;
        }
    body { background: #fff; }
    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px 0 rgba(31,38,135,0.08);
      border: 1px solid #e5e7eb;
      max-width: 400px;
      width: 100%;
      padding: 40px 32px 32px 32px;
      margin: 48px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .login-logo {
      width: 40px; height: 40px; margin-bottom: 8px;
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 2px;
    }
    .login-subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 0;
    }
    .login-label {
      color: #334155;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .login-input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
      font-size: 1rem;
      color: #1e293b;
      background: #fff;
      margin-bottom: 0;
      transition: border 0.2s;
      height: 40px;
      box-sizing: border-box;
      line-height: 1.2;
    }
    .login-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px #3b82f633;
    }
    .login-btn {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      font-weight: 700;
      font-size: 1.08rem;
      border: none;
      border-radius: 8px;
      padding: 12px 0;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #2563eb;
    }
    .login-footer {
      text-align: center;
      color: #64748b;
      font-size: 0.97rem;
      margin-top: 8px;
    }
    .login-footer a {
      color: #3b82f6;
      font-weight: 600;
      text-decoration: none;
    }
    .login-footer a:hover {
      text-decoration: underline;
    }
    .otp-hidden {
      display: none;
    }
    .otp-status {
      text-align: left;
      margin-top: 8px;
    }
  </style>
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center">
  <div class="login-bg">
    <div class="login-card">
            <button type="button" id="google-login-btn" class="google-btn" tabindex="0">
              <span class="google-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><g><path fill="#4285F4" d="M24 9.5c3.54 0 6.7 1.22 9.19 3.23l6.85-6.85C35.64 2.39 30.18 0 24 0 14.82 0 6.71 5.48 2.69 13.44l7.98 6.2C12.13 13.09 17.62 9.5 24 9.5z"/><path fill="#34A853" d="M46.1 24.55c0-1.64-.15-3.22-.42-4.74H24v9.01h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.6C43.98 37.13 46.1 31.36 46.1 24.55z"/><path fill="#FBBC05" d="M10.67 28.13a14.5 14.5 0 0 1 0-8.26l-7.98-6.2A23.94 23.94 0 0 0 0 24c0 3.91.94 7.62 2.69 10.87l7.98-6.2z"/><path fill="#EA4335" d="M24 48c6.18 0 11.36-2.05 15.14-5.59l-7.19-5.6c-2 1.36-4.56 2.17-7.95 2.17-6.38 0-11.87-3.59-14.33-8.74l-7.98 6.2C6.71 42.52 14.82 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></g></svg>
              </span>
              Continue with Google
            </button>
            <div class="divider">or</div>
      <div class="login-header">

      </div>
      <form id="phone-login-form" autocomplete="off" class="login-form">
        <div class="login-form-email">
          <label class="login-label" for="login-phone">Phone Number</label>
          <input class="login-input" type="tel" id="login-phone" placeholder="Enter phone number" autocomplete="tel" required>
        </div>
        <div class="login-form-email otp-hidden" id="otp-section">
          <label class="login-label" for="login-otp">OTP</label>
          <input class="login-input" type="text" id="login-otp" placeholder="Enter 6-digit OTP" inputmode="numeric" pattern="[0-9]{6}">
        </div>
        <button type="button" id="send-otp-btn" class="login-btn login-btn-margin">Send OTP</button>
        <button type="button" id="verify-otp-btn" class="login-btn login-btn-margin otp-hidden">Verify OTP</button>
        <p id="otp-status" class="login-footer otp-status"></p>
      </form>
      <div id="recaptcha-container"></div>
    </div>
  </div>
  <script src="shop.js"></script>
  <script src="firebase-runtime-config.js"></script>
  <script type="module">
    import { auth } from "./firebase-config.js";
    import { GoogleAuthProvider, RecaptchaVerifier, signInWithPhoneNumber, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const googleLoginButton = document.getElementById('google-login-btn');
    const phoneInput = document.getElementById('login-phone');
    const otpInput = document.getElementById('login-otp');
    const otpSection = document.getElementById('otp-section');
    const sendOtpButton = document.getElementById('send-otp-btn');
    const verifyOtpButton = document.getElementById('verify-otp-btn');
    const otpStatus = document.getElementById('otp-status');

    let confirmationResult = null;
    let recaptchaVerifier = null;
    const googleProvider = new GoogleAuthProvider();

    googleLoginButton.addEventListener('click', async () => {
      otpStatus.textContent = 'Signing in with Google...';
      try {
        await signInWithPopup(auth, googleProvider);
        window.location.href = 'account.html';
      } catch (error) {
        otpStatus.textContent = error.message || 'Google sign-in failed. Please try again.';
      }
    });

    function normalizePhone(value) {
      const digits = String(value || '').replace(/\D/g, '');
      if (digits.length === 10) {
        return `+91${digits}`;
      }
      if (digits.length > 10 && String(value || '').trim().startsWith('+')) {
        return `+${digits}`;
      }
      return '';
    }

    function getRecaptchaVerifier() {
      if (!recaptchaVerifier) {
        recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
          size: 'invisible'
        });
      }
      return recaptchaVerifier;
    }

    sendOtpButton.addEventListener('click', async () => {
      const phoneNumber = normalizePhone(phoneInput.value);
      if (!phoneNumber) {
        otpStatus.textContent = 'Enter a valid phone number with country code (example: +91XXXXXXXXXX).';
        return;
      }

      otpStatus.textContent = 'Sending OTP...';
      try {
        confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, getRecaptchaVerifier());
        otpSection.classList.remove('otp-hidden');
        verifyOtpButton.classList.remove('otp-hidden');
        sendOtpButton.classList.add('otp-hidden');
        otpStatus.textContent = `OTP sent to ${phoneNumber}.`;
      } catch (error) {
        otpStatus.textContent = error.message || 'Failed to send OTP. Please try again.';
      }
    });

    verifyOtpButton.addEventListener('click', async () => {
      const otp = String(otpInput.value || '').trim();
      if (!confirmationResult) {
        otpStatus.textContent = 'Please request OTP first.';
        return;
      }
      if (!/^\d{6}$/.test(otp)) {
        otpStatus.textContent = 'Enter a valid 6-digit OTP.';
        return;
      }

      otpStatus.textContent = 'Verifying OTP...';
      try {
        await confirmationResult.confirm(otp);
        window.location.href = 'account.html';
      } catch (error) {
        otpStatus.textContent = error.message || 'Invalid OTP. Please try again.';
      }
    });
  </script>
</body>
</html>
