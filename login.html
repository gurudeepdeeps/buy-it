<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy it - Login</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <link rel="stylesheet" href="main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
                        .login-header {
                          display: flex;
                          flex-direction: column;
                          align-items: center;
                          justify-content: center;
                          margin-bottom: 18px;
                        }
                .divider {
                  display: flex;
                  align-items: center;
                  text-align: center;
                  color: #94a3b8;
                  font-size: 0.97rem;
                  margin: 0 0 18px 0;
                  width: 100%;
                }
                .divider::before, .divider::after {
                  content: '';
                  flex: 1;
                  border-bottom: 1px solid #e5e7eb;
                  margin: 0 10px;
                }
            .google-btn {
              width: 100%;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 10px;
              background: #fff;
              border: 1px solid #e5e7eb;
              border-radius: 8px;
              font-weight: 600;
              font-size: 1.05rem;
              color: #1e293b;
              padding: 10px 0;
              margin-bottom: 18px;
              cursor: pointer;
              transition: background 0.2s, border 0.2s;
            }
            .google-btn:hover {
              background: #f1f5f9;
              border-color: #cbd5e1;
            }
            .google-icon {
              width: 20px;
              height: 20px;
              display: inline-block;
            }
        .login-bg {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f6f8fa;
        }
        .login-header {
          margin-bottom: 28px;
        }
        .login-form {
          display: flex;
          flex-direction: column;
          gap: 0;
        }
        .login-form-email {
          margin-bottom: 18px;
        }
        .login-form-email .login-input {
          box-sizing: border-box;
          width: 100%;
          min-width: 0;
        }
        .login-form-password {
          margin-bottom: 4px;
          position: relative;
        }
        .login-form-password .login-input {
          padding-right: 38px;
          box-sizing: border-box;
          width: 100%;
          min-width: 0;
        }
        .login-btn-margin {
          margin-top: 18px;
        }
        .login-footer-margin {
          margin-top: 22px;
        }
    body { background: #fff; }
    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px 0 rgba(31,38,135,0.08);
      border: 1px solid #e5e7eb;
      max-width: 400px;
      width: 100%;
      padding: 40px 32px 32px 32px;
      margin: 48px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .login-logo {
      width: 40px; height: 40px; margin-bottom: 8px;
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 2px;
    }
    .login-subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 0;
    }
    .login-label {
      color: #334155;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .login-input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
      font-size: 1rem;
      color: #1e293b;
      background: #fff;
      margin-bottom: 0;
      transition: border 0.2s;
      height: 40px;
      box-sizing: border-box;
      line-height: 1.2;
    }
    .login-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px #3b82f633;
    }
    .login-btn {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      font-weight: 700;
      font-size: 1.08rem;
      border: none;
      border-radius: 8px;
      padding: 12px 0;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #2563eb;
    }
    .login-footer {
      text-align: center;
      color: #64748b;
      font-size: 0.97rem;
      margin-top: 8px;
    }
    .login-footer a {
      color: #3b82f6;
      font-weight: 600;
      text-decoration: none;
    }
    .login-footer a:hover {
      text-decoration: underline;
    }
    .otp-hidden {
      display: none;
    }
    .otp-status {
      text-align: left;
      margin-top: 8px;
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 20px;
    }
    .otp-status-info {
      color: #334155;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .otp-status-success {
      color: #166534;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }
    .otp-status-error {
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center">
  <div class="login-bg">
    <div class="login-card">
            <button type="button" id="google-login-btn" class="google-btn" tabindex="0">
              <span class="google-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><g><path fill="#4285F4" d="M24 9.5c3.54 0 6.7 1.22 9.19 3.23l6.85-6.85C35.64 2.39 30.18 0 24 0 14.82 0 6.71 5.48 2.69 13.44l7.98 6.2C12.13 13.09 17.62 9.5 24 9.5z"/><path fill="#34A853" d="M46.1 24.55c0-1.64-.15-3.22-.42-4.74H24v9.01h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.6C43.98 37.13 46.1 31.36 46.1 24.55z"/><path fill="#FBBC05" d="M10.67 28.13a14.5 14.5 0 0 1 0-8.26l-7.98-6.2A23.94 23.94 0 0 0 0 24c0 3.91.94 7.62 2.69 10.87l7.98-6.2z"/><path fill="#EA4335" d="M24 48c6.18 0 11.36-2.05 15.14-5.59l-7.19-5.6c-2 1.36-4.56 2.17-7.95 2.17-6.38 0-11.87-3.59-14.33-8.74l-7.98 6.2C6.71 42.52 14.82 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></g></svg>
              </span>
              Continue with Google
            </button>
            <div class="divider">or</div>
      <div class="login-header">

      </div>
      <form id="phone-login-form" autocomplete="off" class="login-form">
        <div class="login-form-email">
          <label class="login-label" for="login-phone">Phone Number</label>
          <input class="login-input" type="tel" id="login-phone" placeholder="Enter phone number" autocomplete="tel" required>
        </div>
        <div class="login-form-email otp-hidden" id="otp-section">
          <label class="login-label" for="login-otp">OTP</label>
          <input class="login-input" type="text" id="login-otp" placeholder="Enter 6-digit OTP" inputmode="numeric" pattern="[0-9]{6}">
        </div>
        <button type="button" id="send-otp-btn" class="login-btn login-btn-margin">Send OTP</button>
        <button type="button" id="verify-otp-btn" class="login-btn login-btn-margin otp-hidden">Verify OTP</button>
        <p id="otp-status" class="login-footer otp-status"></p>
      </form>
      <div id="recaptcha-container"></div>
    </div>
  </div>
  <script src="shop.js"></script>
  <script src="firebase-runtime-config.js"></script>
  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { GoogleAuthProvider, RecaptchaVerifier, getRedirectResult, onAuthStateChanged, signInWithPhoneNumber, signInWithPopup, signInWithRedirect, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const googleLoginButton = document.getElementById('google-login-btn');
    const phoneInput = document.getElementById('login-phone');
    const otpInput = document.getElementById('login-otp');
    const otpSection = document.getElementById('otp-section');
    const sendOtpButton = document.getElementById('send-otp-btn');
    const verifyOtpButton = document.getElementById('verify-otp-btn');
    const otpStatus = document.getElementById('otp-status');

    let confirmationResult = null;
    let recaptchaVerifier = null;
    const urlParams = new URLSearchParams(window.location.search);
    const wantsAdminLogin = urlParams.get('admin') === '1';
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: 'select_account' });

    async function isAdminUser(user) {
      if (!user) {
        return false;
      }

      const [idTokenResult, userDocSnapshot] = await Promise.all([
        user.getIdTokenResult(),
        getDoc(doc(db, 'users', user.uid))
      ]);

      const byClaim = idTokenResult?.claims?.admin === true;
      const byDoc = userDocSnapshot.exists() && String(userDocSnapshot.data()?.role || '').toLowerCase() === 'admin';
      return byClaim || byDoc;
    }

    async function redirectAfterLogin(user) {
      const isAdmin = await isAdminUser(user);
      if (isAdmin) {
        window.location.replace('admin.html');
        return;
      }

      if (wantsAdminLogin) {
        await signOut(auth);
        setOtpStatus('This account is not an admin account. Use the admin account with role = admin.', 'error');
        return;
      }

      window.location.replace('index.html');
    }

    function getFriendlyAuthErrorMessage(error, fallbackMessage) {
      const code = error?.code || '';

      const messages = {
        'auth/invalid-phone-number': 'Please enter a valid phone number.',
        'auth/missing-phone-number': 'Phone number is required.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/quota-exceeded': 'OTP quota exceeded. Please try again later.',
        'auth/captcha-check-failed': 'reCAPTCHA verification failed. Please try again.',
        'auth/invalid-verification-code': 'Invalid OTP. Please check and try again.',
        'auth/code-expired': 'OTP expired. Please request a new OTP.',
        'auth/session-expired': 'Session expired. Please request OTP again.',
        'auth/popup-blocked': 'Popup was blocked. Continuing with redirect sign-in...',
        'auth/popup-closed-by-user': 'Sign-in popup was closed before completing login.',
        'auth/cancelled-popup-request': 'Sign-in was interrupted. Please try again.',
        'auth/network-request-failed': 'Network issue detected. Check your internet and retry.',
        'auth/operation-not-allowed': 'This sign-in method is not enabled in Firebase console.',
        'auth/unauthorized-domain': 'This domain is not authorized for Firebase authentication.'
      };

      return messages[code] || fallbackMessage || 'Login failed. Please try again.';
    }

    function setOtpStatus(message, type = 'info') {
      otpStatus.textContent = message || '';
      otpStatus.classList.remove('otp-status-info', 'otp-status-success', 'otp-status-error');

      if (!message) {
        return;
      }

      if (type === 'success') {
        otpStatus.classList.add('otp-status-success');
        return;
      }

      if (type === 'error') {
        otpStatus.classList.add('otp-status-error');
        return;
      }

      otpStatus.classList.add('otp-status-info');
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        return;
      }
      redirectAfterLogin(user).catch(() => {
      });
    });

    getRedirectResult(auth)
      .then((result) => {
        if (result?.user) {
          return redirectAfterLogin(result.user);
        }
      })
      .catch((error) => {
        setOtpStatus(getFriendlyAuthErrorMessage(error, 'Google sign-in failed. Please try again.'), 'error');
      });

    googleLoginButton.addEventListener('click', async () => {
      setOtpStatus('Signing in with Google...', 'info');
      try {
        const result = await signInWithPopup(auth, googleProvider);
        await redirectAfterLogin(result.user);
      } catch (error) {
        if (error?.code === 'auth/popup-blocked' || error?.code === 'auth/cancelled-popup-request') {
          setOtpStatus(getFriendlyAuthErrorMessage(error, 'Switching to redirect sign-in...'), 'info');
          try {
            await signInWithRedirect(auth, googleProvider);
            return;
          } catch (redirectError) {
            setOtpStatus(getFriendlyAuthErrorMessage(redirectError, 'Google sign-in failed. Please try again.'), 'error');
            return;
          }
        }
        setOtpStatus(getFriendlyAuthErrorMessage(error, 'Google sign-in failed. Please try again.'), 'error');
      }
    });

    function normalizePhone(value) {
      const digits = String(value || '').replace(/\D/g, '');
      if (digits.length === 10) {
        return `+91${digits}`;
      }
      if (digits.length > 10 && String(value || '').trim().startsWith('+')) {
        return `+${digits}`;
      }
      return '';
    }

    function getRecaptchaVerifier() {
      if (!recaptchaVerifier) {
        recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
          size: 'invisible'
        });
      }
      return recaptchaVerifier;
    }

    sendOtpButton.addEventListener('click', async () => {
      const phoneNumber = normalizePhone(phoneInput.value);
      if (!phoneNumber) {
        setOtpStatus('Enter a valid phone number with country code (example: +91XXXXXXXXXX).', 'error');
        return;
      }

      setOtpStatus('Sending OTP...', 'info');
      try {
        confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, getRecaptchaVerifier());
        otpSection.classList.remove('otp-hidden');
        verifyOtpButton.classList.remove('otp-hidden');
        sendOtpButton.classList.add('otp-hidden');
        setOtpStatus(`OTP sent to ${phoneNumber}.`, 'success');
      } catch (error) {
        setOtpStatus(getFriendlyAuthErrorMessage(error, 'Failed to send OTP. Please try again.'), 'error');
      }
    });

    verifyOtpButton.addEventListener('click', async () => {
      const otp = String(otpInput.value || '').trim();
      if (!confirmationResult) {
        setOtpStatus('Please request OTP first.', 'error');
        return;
      }
      if (!/^\d{6}$/.test(otp)) {
        setOtpStatus('Enter a valid 6-digit OTP.', 'error');
        return;
      }

      setOtpStatus('Verifying OTP...', 'info');
      try {
        const result = await confirmationResult.confirm(otp);
        setOtpStatus('Login successful. Redirecting...', 'success');
        await redirectAfterLogin(result.user);
      } catch (error) {
        setOtpStatus(getFriendlyAuthErrorMessage(error, 'Invalid OTP. Please try again.'), 'error');
      }
    });
  </script>
</body>
</html>
