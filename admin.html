<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy it Admin - Dashboard</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <script src="admin-auth.js"></script>
  <script src="admin-data.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#135bec',
            'background-light': '#f6f6f8'
          },
          fontFamily: {
            display: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background-light font-display text-slate-900">
  <div class="min-h-screen md:flex">
    <aside class="hidden md:flex md:w-64 md:flex-col bg-white border-r border-slate-200">
      <div class="h-16 px-5 flex items-center border-b border-slate-200">
        <img src="buyit-logo-tansperant.png" alt="Buy it" class="h-20 w-auto object-contain" />
        <span class="ml-3 text-lg font-bold">Admin Panel</span>
      </div>
      <nav class="p-3 space-y-1 flex-1">
        <a href="admin.html" class="block px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold">Dashboard</a>
        <a href="admin-products.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Products</a>
        <a href="admin-orders.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Orders</a>
        <a href="admin-settings.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Settings</a>
      </nav>
      <div class="p-3 border-t border-slate-200">
        <button onclick="adminLogout()" class="w-full px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700">Logout</button>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 lg:p-8">
      <header class="mb-6">
        <h1 class="text-2xl sm:text-3xl font-bold">Dashboard</h1>
        <p class="text-slate-600 mt-1">Overview of key store operations.</p>
      </header>

      <section class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
        <div class="bg-white border border-slate-200 rounded-xl p-4">
          <p class="text-sm text-slate-500">Total Orders</p>
          <p id="kpi-total-orders" class="text-2xl font-bold mt-1">0</p>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-4">
          <p class="text-sm text-slate-500">Pending Orders</p>
          <p id="kpi-pending-orders" class="text-2xl font-bold mt-1">0</p>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-4">
          <p class="text-sm text-slate-500">Active Products</p>
          <p id="kpi-active-products" class="text-2xl font-bold mt-1">0</p>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-4">
          <p class="text-sm text-slate-500">Revenue (Month)</p>
          <p id="kpi-revenue" class="text-2xl font-bold mt-1">₹0</p>
        </div>
      </section>

      <section class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        <div class="xl:col-span-2 bg-white border border-slate-200 rounded-xl overflow-hidden">
          <div class="px-4 py-3 border-b border-slate-200">
            <h2 class="font-semibold">Recent Orders</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600">
                <tr>
                  <th class="text-left px-4 py-3">Order ID</th>
                  <th class="text-left px-4 py-3">Customer</th>
                  <th class="text-left px-4 py-3">Product Name(s)</th>
                  <th class="text-left px-4 py-3">Amount</th>
                  <th class="text-left px-4 py-3">Status</th>
                </tr>
              </thead>
              <tbody id="recent-orders-body"></tbody>
            </table>
          </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-4">
          <h2 class="font-semibold mb-3">Quick Actions</h2>
          <div class="space-y-2">
            <a href="admin-products.html" class="block w-full px-3 py-2 rounded-lg bg-primary text-white text-center hover:opacity-90">Manage Products</a>
            <a href="admin-orders.html" class="block w-full px-3 py-2 rounded-lg bg-slate-900 text-white text-center hover:bg-slate-700">Manage Orders</a>
            <a href="admin-settings.html" class="block w-full px-3 py-2 rounded-lg border border-slate-200 text-slate-700 text-center hover:bg-slate-50">Store Settings</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { collection, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    function waitForAuthenticatedUser() {
      return new Promise((resolve) => {
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          unsubscribe();
          resolve(user || null);
        });
      });
    }

    function toMillis(value) {
      if (!value) {
        return 0;
      }
      if (typeof value?.toMillis === 'function') {
        return value.toMillis();
      }
      const date = new Date(value);
      const millis = date.getTime();
      return Number.isFinite(millis) ? millis : 0;
    }

    function toAmount(order) {
      const directAmount = Number(order?.amount);
      if (Number.isFinite(directAmount) && directAmount > 0) {
        return directAmount;
      }

      const totalAmount = Number(order?.totalAmount);
      if (Number.isFinite(totalAmount) && totalAmount > 0) {
        return totalAmount;
      }

      const items = Array.isArray(order?.items) ? order.items : [];
      const computed = items.reduce((sum, item) => sum + Number(item?.price || 0) * Math.max(1, Number(item?.quantity || 1)), 0);
      return Number.isFinite(computed) ? computed : 0;
    }

    function getCustomerName(order) {
      const fromOrder = String(order?.customer || order?.customerName || '').trim();
      if (fromOrder) {
        return fromOrder;
      }

      const firstName = String(order?.address?.['first-name'] || '').trim();
      const lastName = String(order?.address?.['last-name'] || '').trim();
      const fromAddress = `${firstName} ${lastName}`.trim();
      return fromAddress || 'Guest Customer';
    }

    async function loadDashboardData() {
      const [productsSnapshot, topLevelOrdersSnapshot, groupedOrdersSnapshot] = await Promise.all([
        getDocs(collection(db, 'products')),
        getDocs(collection(db, 'orders')).catch(() => null),
        getDocs(collectionGroup(db, 'orders')).catch(() => null)
      ]);

      const products = productsSnapshot.docs.map((snapshot) => snapshot.data() || {});
      const orderByPath = new Map();

      const appendOrders = (snapshot) => {
        if (!snapshot?.docs?.length) {
          return;
        }
        snapshot.docs.forEach((docSnapshot) => {
          orderByPath.set(docSnapshot.ref.path, {
            id: docSnapshot.id,
            ...(docSnapshot.data() || {})
          });
        });
      };

      appendOrders(topLevelOrdersSnapshot);
      appendOrders(groupedOrdersSnapshot);

      const orders = Array.from(orderByPath.values());
      const fallbackOrders = typeof window.AdminData?.getOrders === 'function' ? window.AdminData.getOrders() : [];

      if (orders.length === 0 && Array.isArray(fallbackOrders) && fallbackOrders.length > 0) {
        return { products, orders: fallbackOrders };
      }

      return { products, orders };
    }

    function renderDashboardRows(orders) {
      const tbody = document.getElementById('recent-orders-body');
      if (!orders.length) {
        tbody.innerHTML = '<tr class="border-t border-slate-100"><td colspan="4" class="px-4 py-8 text-center text-slate-500">No real order data available yet.</td></tr>';
        return;
      }

      const recentOrders = [...orders]
        .sort((a, b) => toMillis(b.createdAt || b.date || b.placedAt) - toMillis(a.createdAt || a.date || a.placedAt))
        .slice(0, 5);

      tbody.innerHTML = recentOrders.map((order) => {
        const id = order.id || order.orderId || '-';
        const customer = getCustomerName(order);
        const productNames = Array.isArray(order.items) ? order.items.map(item => item.title || item.name || '-').join(', ') : '-';
        // Fix date display for Firestore Timestamp and other types
        let dateVal = order.date || order.createdAt || order.placedAt || '';
        let date = '-';
        if (typeof dateVal === 'string') {
          date = window.AdminData.formatDate(dateVal);
        } else if (dateVal instanceof Date) {
          date = window.AdminData.formatDate(dateVal.toISOString());
        } else if (typeof dateVal === 'object' && typeof dateVal.toDate === 'function') {
          // Firestore Timestamp object
          date = window.AdminData.formatDate(dateVal.toDate().toISOString());
        } else {
          date = window.AdminData.formatDate(String(dateVal));
        }
        const amount = window.AdminData.formatCurrency(toAmount(order));
        const status = String(order.status || 'Unknown');
        const badgeClass = window.AdminData.statusBadgeClass(status);
        return '<tr class="border-t border-slate-100">'
          + '<td class="px-4 py-3">' + id + '</td>'
          + '<td class="px-4 py-3">' + customer + '</td>'
          + '<td class="px-4 py-3">' + productNames + '</td>'
          + '<td class="px-4 py-3">' + date + '</td>'
          + '<td class="px-4 py-3">' + amount + '</td>'
          + '<td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ' + badgeClass + '">' + status + '</span></td>'
          + '</tr>';
      }).join('');
    }

    function showDashboardLoadingState() {
      document.getElementById('kpi-total-orders').textContent = 'Loading...';
      document.getElementById('kpi-pending-orders').textContent = 'Loading...';
      document.getElementById('kpi-active-products').textContent = 'Loading...';
      document.getElementById('kpi-revenue').textContent = 'Loading...';

      const tbody = document.getElementById('recent-orders-body');
      tbody.innerHTML = '<tr class="border-t border-slate-100"><td colspan="4" class="px-4 py-8 text-center text-slate-500">Loading dashboard data...</td></tr>';
    }

    async function renderDashboard() {
      showDashboardLoadingState();
      try {
        const currentUser = await waitForAuthenticatedUser();
        if (!currentUser) {
          window.location.href = 'login.html?admin=1';
          return;
        }

        const { products, orders } = await loadDashboardData();

        const totalOrders = orders.length;
        const pendingOrders = orders.filter((order) => String(order.status || '').toLowerCase() === 'processing').length;
        const activeProducts = products.filter((product) => String(product.status || (product.inStock ? 'Active' : 'Out of Stock')).toLowerCase() === 'active').length;

        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        const monthlyRevenue = orders.reduce((sum, order) => {
          const rawDate = order.createdAt || order.date || order.placedAt;
          const orderDate = rawDate?.toDate ? rawDate.toDate() : new Date(rawDate);
          if (!(orderDate instanceof Date) || Number.isNaN(orderDate.getTime())) {
            return sum;
          }
          if (orderDate.getMonth() !== currentMonth || orderDate.getFullYear() !== currentYear) {
            return sum;
          }
          return sum + toAmount(order);
        }, 0);

        document.getElementById('kpi-total-orders').textContent = String(totalOrders);
        document.getElementById('kpi-pending-orders').textContent = String(pendingOrders);
        document.getElementById('kpi-active-products').textContent = String(activeProducts);
        document.getElementById('kpi-revenue').textContent = window.AdminData.formatCurrency(monthlyRevenue);

        renderDashboardRows(orders);
      } catch (_error) {
        const tbody = document.getElementById('recent-orders-body');
        tbody.innerHTML = '<tr class="border-t border-slate-100"><td colspan="4" class="px-4 py-8 text-center text-red-600">Failed to load dashboard data.</td></tr>';
      }
    }

    function adminLogout() {
      if (typeof window.__adminLogout === 'function') {
        window.__adminLogout();
        return;
      }
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('role');
      window.location.href = 'login.html?admin=1';
    }

    renderDashboard();
  </script>
</body>
</html>
