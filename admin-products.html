<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy it Admin - Products</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <script src="admin-auth.js"></script>
  <script src="admin-data.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#135bec',
            'background-light': '#f6f6f8'
          },
          fontFamily: {
            display: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background-light font-display text-slate-900">
  <div class="min-h-screen md:flex">
    <aside class="hidden md:flex md:w-64 md:flex-col bg-white border-r border-slate-200">
      <div class="h-16 px-5 flex items-center border-b border-slate-200">
        <img src="buyit-logo.png" alt="Buy it" class="h-8 w-8 rounded" />
        <span class="ml-3 text-lg font-bold">Admin Panel</span>
      </div>
      <nav class="p-3 space-y-1 flex-1">
        <a href="admin.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Dashboard</a>
        <a href="admin-products.html" class="block px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold">Products</a>
        <a href="admin-orders.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Orders</a>
        <a href="admin-settings.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 text-slate-700">Settings</a>
      </nav>
      <div class="p-3 border-t border-slate-200">
        <button onclick="adminLogout()" class="w-full px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700">Logout</button>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 lg:p-8">
      <header class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div>
          <h1 class="text-2xl sm:text-3xl font-bold">Products</h1>
          <p class="text-slate-600 mt-1">Manage product catalog and availability.</p>
        </div>
        <button id="add-product-btn" class="px-4 py-2 rounded-lg bg-primary text-white hover:opacity-90">Add Product</button>
      </header>

      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-600">
              <tr>
                <th class="text-left px-4 py-3">Product</th>
                <th class="text-left px-4 py-3">Category</th>
                <th class="text-left px-4 py-3">Price</th>
                <th class="text-left px-4 py-3">Stock</th>
                <th class="text-left px-4 py-3">Status</th>
                <th class="text-left px-4 py-3">Actions</th>
              </tr>
            </thead>
            <tbody id="products-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    function renderProducts() {
      const products = window.AdminData.getProducts();
      const tbody = document.getElementById('products-body');

      if (products.length === 0) {
        tbody.innerHTML = '<tr class="border-t border-slate-100"><td colspan="6" class="px-4 py-8 text-center text-slate-500">No real product data available yet.</td></tr>';
        return;
      }

      tbody.innerHTML = products.map(product => {
        const title = product.title || product.name || '-';
        const category = product.category || '-';
        const price = window.AdminData.formatCurrency(product.price || 0);
        const stock = Number(product.stock || 0);
        const status = stock > 0 ? 'Active' : 'Out of Stock';
        const statusClass = stock > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
        return '<tr class="border-t border-slate-100">'
          + '<td class="px-4 py-3 font-medium">' + title + '</td>'
          + '<td class="px-4 py-3">' + category + '</td>'
          + '<td class="px-4 py-3">' + price + '</td>'
          + '<td class="px-4 py-3">' + stock + '</td>'
          + '<td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ' + statusClass + '">' + status + '</span></td>'
          + '<td class="px-4 py-3 text-slate-400">-</td>'
          + '</tr>';
      }).join('');
    }

    function adminLogout() {
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('role');
      window.location.href = 'login.html';
    }

    document.getElementById('add-product-btn').addEventListener('click', function () {
      alert('Add Product requires backend/form integration. No fake product will be added.');
    });

    renderProducts();
  </script>
</body>
</html>
