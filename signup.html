<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy it - Signup</title>
  <link rel="icon" href="buyit-logo-tansperant.png" type="image/png">
  <link rel="stylesheet" href="main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <!-- Material Symbols for eye icon -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    .forgot-link {
      display: block;
      text-align: right;
      color: #3b82f6;
      font-size: 0.97rem;
      font-weight: 500;
      margin-bottom: 8px;
      margin-top: 2px;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .forgot-link:hover {
      color: #2563eb;
      text-decoration: underline;
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #94a3b8;
      font-size: 0.97rem;
      margin: 0 0 18px 0;
      width: 100%;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e5e7eb;
      margin: 0 10px;
    }
    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.05rem;
      color: #1e293b;
      padding: 10px 0;
      margin-bottom: 18px;
      cursor: pointer;
      transition: background 0.2s, border 0.2s;
    }
    .google-btn:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }
    .google-icon {
      width: 20px;
      height: 20px;
      display: inline-block;
    }
    .login-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f8fa;
    }
    .login-header {
      margin-bottom: 28px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .login-form-email {
      margin-bottom: 18px;
    }
    .login-form-email .login-input {
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
    }
    .login-form-password {
      margin-bottom: 4px;
      position: relative;
    }
    .login-form-password .login-input {
      padding-right: 38px;
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
    }
    .login-btn-margin {
      margin-top: 18px;
    }
    .login-footer-margin {
      margin-top: 22px;
    }
    body { background: #f6f8fa; }
    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px 0 rgba(31,38,135,0.08);
      border: 1px solid #e5e7eb;
      max-width: 400px;
      width: 100%;
      padding: 40px 32px 32px 32px;
      margin: 48px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .login-logo {
      width: 40px; height: 40px; margin-bottom: 8px;
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 2px;
    }
    .login-subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 0;
    }
    .login-label {
      color: #334155;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .login-input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
      font-size: 1rem;
      color: #1e293b;
      background: #fff;
      margin-bottom: 0;
      transition: border 0.2s;
      height: 40px;
      box-sizing: border-box;
      line-height: 1.2;
    }
    .login-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px #3b82f633;
    }
    .login-password-toggle {
      position: absolute;
      right: 8px;
      top: 0;
      height: 80px;
      width: 36px;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .login-btn {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      font-weight: 700;
      font-size: 1.08rem;
      border: none;
      border-radius: 8px;
      padding: 12px 0;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #2563eb;
    }
    .login-footer {
      text-align: center;
      color: #64748b;
      font-size: 0.97rem;
      margin-top: 8px;
    }
    .login-footer a {
      color: #3b82f6;
      font-weight: 600;
      text-decoration: none;
    }
    .login-footer a:hover {
      text-decoration: underline;
    }
    #eye-icon-signup.material-symbols-outlined {
      font-size: 22px;
      line-height: 1;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center">
  <div class="login-bg">
    <div class="login-card">
      <button type="button" class="google-btn" tabindex="0">
        <span class="google-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><g><path fill="#4285F4" d="M24 9.5c3.54 0 6.7 1.22 9.19 3.23l6.85-6.85C35.64 2.39 30.18 0 24 0 14.82 0 6.71 5.48 2.69 13.44l7.98 6.2C12.13 13.09 17.62 9.5 24 9.5z"/><path fill="#34A853" d="M46.1 24.55c0-1.64-.15-3.22-.42-4.74H24v9.01h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.6C43.98 37.13 46.1 31.36 46.1 24.55z"/><path fill="#FBBC05" d="M10.67 28.13a14.5 14.5 0 0 1 0-8.26l-7.98-6.2A23.94 23.94 0 0 0 0 24c0 3.91.94 7.62 2.69 10.87l7.98-6.2z"/><path fill="#EA4335" d="M24 48c6.18 0 11.36-2.05 15.14-5.59l-7.19-5.6c-2 1.36-4.56 2.17-7.95 2.17-6.38 0-11.87-3.59-14.33-8.74l-7.98 6.2C6.71 42.52 14.82 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></g></svg>
        </span>
        Continue with Google
      </button>
      <div class="divider">or</div>
      <div class="login-header">

      </div>
      <form id="signup-form" autocomplete="off" class="login-form">
        <div class="login-form-email">
          <label class="login-label" for="signup-email">Email</label>
          <input class="login-input" type="email" id="signup-email" placeholder="demo@buyit.com (try this)" value="demo@buyit.com" required>
        </div>
        <div class="login-form-password">
          <label class="login-label" for="signup-password">Password</label>
          <input class="login-input" type="password" id="signup-password" placeholder="demo1234 (try this)" value="demo1234" required>
          <button type="button" id="toggle-signup-password" class="login-password-toggle" tabindex="-1">
            <span id="eye-icon-signup" class="material-symbols-outlined">visibility</span>
          </button>
        </div>
        <button type="submit" class="login-btn login-btn-margin">Sign Up</button>
      </form>
      <div class="login-footer login-footer-margin">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
  <script>
    // Show/hide password toggle for signup
    const signupPasswordInput = document.getElementById('signup-password');
    const toggleSignupPassword = document.getElementById('toggle-signup-password');
    const eyeIconSignup = document.getElementById('eye-icon-signup');
    toggleSignupPassword.addEventListener('click', function() {
      if (signupPasswordInput.type === 'password') {
        signupPasswordInput.type = 'text';
        eyeIconSignup.textContent = 'visibility_off';
      } else {
        signupPasswordInput.type = 'password';
        eyeIconSignup.textContent = 'visibility';
      }
    });
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      // Simulate signup success
      localStorage.setItem('loggedIn', '1');
      window.location.href = 'account.html';
    });
  </script>
</body>
</html>
